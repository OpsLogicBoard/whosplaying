<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Who's Playing Exact Logo Component</title>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap");

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: #eef0f4;
}

.wp-logo-board {
  position: relative;
  width: 754px;
  height: 428px;
  background: #f8f9fb;
  font-family: Inter, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
  overflow: hidden;
}

.wp-logo-label {
  position: absolute;
  top: 43px;
  left: 44px;
  font-size: 15px;
  line-height: 1;
  font-weight: 800;
  letter-spacing: 0.02em;
  color: #111318;
}

.wp-logo-lockup {
  position: absolute;
  top: 72px;
  left: 48px;
  width: 622px;
  height: 235px;
}

.wp-mark {
  position: absolute;
  left: 0;
  top: 0;
  width: 250px;
  height: 270px;
  overflow: visible;
}

.wp-wordmark {
  position: absolute;
  left: 277px;
  top: 27px;
}

.wp-whos {
  font-size: 74px;
  line-height: 0.92;
  font-weight: 900;
  letter-spacing: -0.055em;
  color: #071020;
}

.wp-playing {
  margin-top: 14px;
  font-size: 77px;
  line-height: 0.9;
  font-weight: 900;
  letter-spacing: -0.055em;
  background: linear-gradient(180deg, #ff8751 0%, #ff5a5f 52%, #ff3f73 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.wp-tagline {
  position: absolute;
  top: 361px;
  left: 124px;
  font-size: 16px;
  line-height: 1;
  font-weight: 800;
  letter-spacing: 0.105em;
  color: #111318;
  white-space: nowrap;
}
</style>
</head>
<body>
<section class="wp-logo-board" aria-label="Who's Playing primary logo">
  <div class="wp-logo-label">PRIMARY LOGO</div>

  <div class="wp-logo-lockup">
    <svg class="wp-mark" viewBox="0 0 250 270" aria-hidden="true">
      <defs>
        <linearGradient id="wpPinGradient" x1="40" y1="20" x2="215" y2="250" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ff4f63"/>
          <stop offset="48%" stop-color="#ff6b42"/>
          <stop offset="100%" stop-color="#ff2f70"/>
        </linearGradient>
      </defs>
      <path d="M31 100 C8 125 8 165 31 190" fill="none" stroke="#ff5a5f" stroke-width="8" stroke-linecap="round"/>
      <path d="M48 118 C34 135 34 155 48 172" fill="none" stroke="#ff7a3f" stroke-width="7" stroke-linecap="round"/>
      <path d="M126 18 C178 18 219 59 219 111 C219 173 154 233 126 258 C98 233 33 173 33 111 C33 59 74 18 126 18Z" fill="url(#wpPinGradient)"/>
      <circle cx="126" cy="111" r="67" fill="#ffffff"/>
      <path d="M108 78 C108 72 115 69 120 73 L159 101 C166 106 166 116 159 121 L120 149 C115 153 108 150 108 144Z" fill="url(#wpPinGradient)"/>
      <path d="M221 166 C240 181 240 209 221 225" fill="none" stroke="#ff7a3f" stroke-width="7" stroke-linecap="round"/>
      <path d="M204 178 C216 188 216 201 204 211" fill="none" stroke="#ff5a5f" stroke-width="7" stroke-linecap="round"/>
    </svg>

    <div class="wp-wordmark">
      <div class="wp-whos">who&rsquo;s</div>
      <div class="wp-playing">playing</div>
    </div>
  </div>

  <div class="wp-tagline">LIVE MUSIC. &nbsp; LOCAL PEOPLE. &nbsp; REAL CONNECTION.</div>
</section>
</body>
</html>
