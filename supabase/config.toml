# WhosPlaying — local Supabase stack config
project_id = "whosplaying"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback", "whosplaying://auth/callback"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[storage]
enabled = true
file_size_limit = "50MiB"

[edge_runtime]
enabled = true
inspector_port = 8083

# Stripe webhooks authenticate via signature, not a Supabase JWT — the gateway
# must let unauthenticated requests reach the function (we verify the signature
# inside). checkout/portal keep verify_jwt on (called with the user's JWT).
[functions.stripe-webhook]
verify_jwt = false
